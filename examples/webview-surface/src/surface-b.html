<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center;
           height: 100vh; background: #065f46; color: #fff; font-family: system-ui;
           flex-direction: column; gap: 12px; }
    h1 { font-size: 28px; }
    p { color: #6ee7b7; font-size: 14px; }
    button { padding: 8px 20px; border: none; border-radius: 6px; background: #10b981;
             color: #fff; font-size: 15px; cursor: pointer; }
    #count { font-size: 48px; font-weight: 700; }
  </style>
</head>
<body>
  <h1>Surface B</h1>
  <div id="count">0</div>
  <button id="btn">Click me</button>
  <p>Independent native BrowserView with its own state</p>
  <script>
    let n = 0;
    document.getElementById("btn").onclick = () => {
      document.getElementById("count").textContent = String(++n);
    };
  </script>
</body>
</html>
