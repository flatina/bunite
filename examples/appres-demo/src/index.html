<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>appres:// Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 24px; background: #0f172a; color: #e2e8f0; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .url { font-family: monospace; color: #94a3b8; font-size: 12px; margin-bottom: 20px; }
    h2 { font-size: 14px; margin: 16px 0 8px; color: #cbd5e1; }
    .buttons { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    button {
      padding: 6px 12px; border: 1px solid #334155; border-radius: 6px;
      background: #1e293b; color: #e2e8f0; font-size: 13px; cursor: pointer;
      font-family: monospace;
    }
    button:hover { background: #334155; }
    bunite-webview {
      display: block; width: 100%; height: 360px;
      border: 1px solid #334155; border-radius: 6px; background: #1e293b;
    }
  </style>
</head>
<body>
  <h1>appres:// Demo</h1>
  <div class="url" id="self-url"></div>

  <h2>Static file — <span class="url">appres://app.internal/about.html</span></h2>
  <div class="buttons">
    <button data-src="appres://app.internal/about">Load /about (extension omitted)</button>
    <button data-src="appres://app.internal/about.html">Load /about.html</button>
  </div>

  <h2>Dynamic route registered via <span class="url">app.getAppRes()</span></h2>
  <div class="buttons">
    <button data-src="appres://app.internal/dynamic/now">/dynamic/now (current time)</button>
    <button data-src="appres://app.internal/dynamic/random">/dynamic/random (random number)</button>
  </div>

  <bunite-webview id="wv" src="appres://app.internal/about"></bunite-webview>

  <script>
    document.getElementById("self-url").textContent = location.href;

    const wv = document.getElementById("wv");
    for (const btn of document.querySelectorAll("button[data-src]")) {
      btn.addEventListener("click", () => {
        wv.setAttribute("src", btn.dataset.src);
      });
    }
  </script>
</body>
</html>
