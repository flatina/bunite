<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #202124; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; color: #e8eaed; }
    #tab-row { display: flex; align-items: flex-end; background: #202124; padding: 6px 8px 0; gap: 2px; min-height: 34px; }
    .tab { display: flex; align-items: center; gap: 6px; padding: 5px 10px; background: #292b2e; border-radius: 8px 8px 0 0; cursor: pointer; max-width: 220px; min-width: 50px; font-size: 12px; color: #9aa0a6; white-space: nowrap; }
    .tab.active { background: #35363a; color: #e8eaed; }
    .tab:hover:not(.active) { background: #313335; }
    .tab-label { overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .tab-close { font-size: 13px; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; border-radius: 50%; opacity: 0; flex-shrink: 0; }
    .tab:hover .tab-close { opacity: 0.6; }
    .tab-close:hover { opacity: 1 !important; background: rgba(255,255,255,0.15); }
    #new-tab-btn { width: 24px; height: 24px; border: none; border-radius: 50%; background: transparent; color: #9aa0a6; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-bottom: 2px; }
    #new-tab-btn:hover { background: rgba(255,255,255,0.1); color: #e8eaed; }
    #toolbar { display: flex; align-items: center; gap: 4px; padding: 4px 4px; background: #35363a; }
    #toolbar button { width: 24px; height: 24px; border: none; border-radius: 50%; background: transparent; color: #9aa0a6; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    #toolbar button:hover { background: rgba(255,255,255,0.1); color: #e8eaed; }
    #url-input { flex: 1; padding: 5px 12px; border: none; border-radius: 14px; font-size: 13px; background: #202124; color: #e8eaed; outline: none; min-width: 0; }
    #url-input:focus { background: #292b2e; }
  </style>
</head>
<body>
  <div id="tab-row">
    <button id="new-tab-btn" title="New tab">+</button>
  </div>
  <div id="toolbar">
    <button id="back-btn" title="Back">&#8592;</button>
    <button id="refresh-btn" title="Refresh">&#8635;</button>
    <input id="url-input" type="text" placeholder="Search or enter URL" />
  </div>
  <script src="views://shell.js"></script>
</body>
</html>
